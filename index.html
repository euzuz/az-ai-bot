<!DOCTYPE html>
<html>
<head>
  <title>AZ AI BOT</title>
</head>
<body>

<h2>Login</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="register()">Register</button>
<button onclick="login()">Login</button>

<hr>

<h2>Chat</h2>
<input id="message" placeholder="اكتب رسالتك">
<button onclick="sendMessage()">Send</button>

<ul id="chat"></ul>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// 🔥 بياناتك
const firebaseConfig = {
  apiKey: "AIzaSyDAWFg9VcA0k11FtFB0DhpMC_MNCGf50No",
  authDomain: "az-ai-bot.firebaseapp.com",
  projectId: "az-ai-bot",
  storageBucket: "az-ai-bot.firebasestorage.app",
  messagingSenderId: "401046040353",
  appId: "1:401046040353:web:ac0dfc4f44313600131860"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let user = null;

// تسجيل
window.register = async () => {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;

  const res = await createUserWithEmailAndPassword(auth, email, pass);
  user = res.user;
  alert("تم التسجيل 🔥");
};

// تسجيل دخول
window.login = async () => {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;

  const res = await signInWithEmailAndPassword(auth, email, pass);
  user = res.user;
  alert("تم تسجيل الدخول ✅");

  loadMessages();
};

// إرسال رسالة
window.sendMessage = async () => {
  const msg = document.getElementById("message").value;

  await addDoc(collection(db, "messages"), {
    uid: user.uid,
    text: msg,
    time: Date.now()
  });

  document.getElementById("message").value = "";
  loadMessages();
};

// تحميل المحادثات
async function loadMessages() {
  const q = query(collection(db, "messages"), where("uid", "==", user.uid));
  const querySnapshot = await getDocs(q);

  const chat = document.getElementById("chat");
  chat.innerHTML = "";

  querySnapshot.forEach((doc) => {
    const li = document.createElement("li");
    li.textContent = doc.data().text;
    chat.appendChild(li);
  });
}
</script>

</body>
</html>
